<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://dev.to; font-src 'self'; media-src 'self'; frame-src https://www.linkedin.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles — Salma Mulla-Supe</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" style="display:flex;flex-direction:column;text-decoration:none;">
        <span style="font-size:1.25rem;font-weight:700;color:var(--text);text-decoration:underline;text-underline-offset:4px;">Salma Mulla-Supe</span>
        <span style="font-size:0.625rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;">Personal Portfolio</span>
      </a>
      <button class="nav-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Introduction</a></li>
        <li><a href="video.html">Media</a></li>
        <li><a href="linkedin.html">Content</a></li>
        <li><a href="articles.html" class="active">Articles</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="lights-toggle" id="lightsToggle" onclick="toggleLights()" aria-label="Toggle lights" style="background:none;border:none;cursor:pointer;padding:8px;color:var(--text);display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);transition:var(--transition);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>
    </div>
  </nav>

  <main class="main">
    <section class="section">
      <div class="container">
        <div class="section-header">
          <span class="section-label">Published Work</span>
          <h2 class="section-title">Articles</h2>
          <p class="section-subtitle">Thoughts, perspectives, and insights shared in long form.</p>
        </div>

        <div class="articles-grid" id="articlesList">
          <!-- Articles populated by JS from localStorage or fallback -->
        </div>

        <div class="view-all">
          <a href="https://dev.to/salma-mulla-supe" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            View All on DEV.to
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>Personal Portfolio</p>
      <p>Salma Mulla-Supe 2026</p>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
    }

    // Lights off / dark mode toggle
    function toggleLights() {
      document.body.classList.toggle('lights-off');
      const isDark = document.body.classList.contains('lights-off');
      localStorage.setItem('lightsOff', isDark ? 'true' : 'false');
    }

    // Check for saved preference
    if (localStorage.getItem('lightsOff') === 'true') {
      document.body.classList.add('lights-off');
    }

    // ── DEV.to Integration ──────────────────────────────────────────
    // Replace with the exact DEV.to username once the account is created
    const DEVTO_USERNAME = 'salma-mulla-supe';

    const DEVTO_PROFILE = `https://dev.to/${DEVTO_USERNAME}`;

    const fallbackArticles = [
      { title: 'Coming Soon', description: 'An article is on its way. Check back shortly.', readable_publish_date: '—', reading_time_minutes: '—', positive_reactions_count: null, comments_count: null, url: DEVTO_PROFILE, cover_image: null },
      { title: 'Coming Soon', description: 'An article is on its way. Check back shortly.', readable_publish_date: '—', reading_time_minutes: '—', positive_reactions_count: null, comments_count: null, url: DEVTO_PROFILE, cover_image: null },
      { title: 'Coming Soon', description: 'An article is on its way. Check back shortly.', readable_publish_date: '—', reading_time_minutes: '—', positive_reactions_count: null, comments_count: null, url: DEVTO_PROFILE, cover_image: null }
    ];

    // XSS Protection: Escape HTML entities
    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderArticles(articles) {
      const container = document.getElementById('articlesList');
      container.innerHTML = articles.map((a, i) => {
        const title = escapeHtml(a.title);
        const description = escapeHtml(a.description);
        const date = escapeHtml(a.readable_publish_date);
        const readTime = a.reading_time_minutes !== '—' ? escapeHtml(a.reading_time_minutes) : '—';
        const reactions = a.positive_reactions_count !== null ? escapeHtml(a.positive_reactions_count) : '—';
        const comments = a.comments_count !== null ? escapeHtml(a.comments_count) : '—';
        const url = escapeHtml(a.url);
        const coverImage = a.cover_image ? escapeHtml(a.cover_image) : null;

        return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="article-card"${coverImage ? ` style="background-image:url('${coverImage}');background-size:cover;background-position:center;"` : ''}>
          <div class="article-header">
            <div class="article-num">${i + 1}</div>
            <div class="article-meta">${date}${readTime !== '—' ? ` · ${readTime} min read` : ''}</div>
          </div>
          <h3 class="article-title">${title}</h3>
          <p class="article-excerpt">${description}</p>
          <div class="article-footer">
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
              ${reactions}
            </span>
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
              ${comments}
            </span>
            <span style="font-size:0.75rem;color:var(--primary);font-weight:600;margin-left:auto;">DEV.to ↗</span>
          </div>
        </a>`;
      }).join('');
    }

    function showSkeleton() {
      const container = document.getElementById('articlesList');
      container.innerHTML = [1,2,3].map(() => `
        <div class="article-card" style="pointer-events:none;">
          <div style="height:12px;width:40%;background:var(--border);border-radius:6px;margin-bottom:16px;animation:pulse 1.5s ease infinite;"></div>
          <div style="height:18px;width:80%;background:var(--border);border-radius:6px;margin-bottom:12px;animation:pulse 1.5s ease infinite;"></div>
          <div style="height:12px;width:90%;background:var(--border);border-radius:6px;animation:pulse 1.5s ease infinite;"></div>
        </div>
      `).join('');
    }

    async function loadArticles() {
      showSkeleton();
      try {
        const res = await fetch(`https://dev.to/api/articles?username=${DEVTO_USERNAME}&per_page=9`);
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        renderArticles(data.length ? data : fallbackArticles);
      } catch (e) {
        renderArticles(fallbackArticles);
      }
    }

    loadArticles();
  </script>
</body>
</html>
